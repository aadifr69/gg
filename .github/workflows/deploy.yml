name: CI/CD Tomcat Deployment

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Java
      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      # Step 3: Install Maven
      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install maven -y

      # Step 4: Build WAR file
      - name: Build WAR
        run: mvn clean package

      # Step 5: Setup SSH key
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 52.12.100.223 >> ~/.ssh/known_hosts

      # Step 6: Copy files to Control Node
      - name: Copy files to Control Node
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -r . ansible@52.12.100.223:/home/ansible/app

      # Step 7: Run Ansible Playbook
      - name: Deploy with Ansible
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ansible@52.12.100.223 << 'EOF'
          cd /home/ansible/app
          ansible-playbook -i inventory.ini deploy.yml
          EOF
