name: Build and Deploy WAR Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Build WAR
      run: |
        mvn clean package -DskipTests
        # Rename WAR to myapp.war for Docker
        cp target/*.war target/myapp.war

    - name: Verify WAR
      run: ls -l target/

    - name: Build Docker image
      run: |
        docker build -t mytomcat:latest .

    - name: Upload WAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22
        source: "target/myapp.war"
        target: "/home/ubuntu/deploy/"

    - name: SSH to EC2 and deploy Docker
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        port: 22
        script: |
          docker stop mytomcat || true
          docker rm mytomcat || true
          docker run -d --name mytomcat -p 8080:8080 mytomcat:latest
