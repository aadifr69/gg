name: CI/CD Tomcat Docker Deployment

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up Java 11
    - name: Set up Java 11
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    # Step 3: Install Maven & Docker
    - name: Install Maven & Docker
      run: |
        sudo apt-get update
        sudo apt-get install -y maven curl gnupg lsb-release ca-certificates
        # Remove conflicting old docker packages if present
        sudo apt-get remove -y docker docker-engine docker.io containerd runc || true
        # Add Docker official GPG key
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        # Add Docker repo
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
        # Install Docker
        sudo apt-get update
        sudo apt-get install -y docker-ce docker-ce-cli containerd.io
        docker --version
        mvn --version

    # Step 4: Build WAR file
    - name: Build WAR
      run: |
        mvn clean package -DskipTests
        if [ ! -f target/myapp.war ]; then
          echo "ERROR: WAR file not found!"
          exit 1
        fi
        ls -l target/  # Verify the WAR exists

    # Step 5: Build Docker image
    - name: Build Docker image
      run: |
        docker build -t mytomcat:latest .

    # Step 6: Login to Docker Hub
    - name: Docker login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Step 7: Push Docker image to Docker Hub
    - name: Push Docker image
      run: |
        docker tag mytomcat:latest ${{ secrets.DOCKER_USERNAME }}/mytomcat:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/mytomcat:latest

   

    - name: Copy Ansible playbook to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: " deploy.yml"
        target: "/etc/ansible/"
        rm: false

    # Step 10: Run Ansible playbook on EC2
    - name: Run deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          ansible-playbook /etc/ansible/deploy.yml
