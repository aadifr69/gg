name: Build and Deploy Java Webapp

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout your repo
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Set up JDK
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 11

    # 3. Build the WAR with Maven
    - name: Build WAR
      run: |
        mvn clean package -DskipTests
        ls -l target/  # verify myapp.war exists

    # 4. Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t mytomcat:latest .

    # 5. (Optional) Push Docker image to Docker Hub or ECR
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v2
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}
    #
    # - name: Push Docker Image
    #   run: docker push mytomcat:latest

    # 6. (Optional) Deploy WAR via SCP to EC2
    - name: Deploy WAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "target/myapp.war"
        target: "/home/ubuntu/myapp.war"
