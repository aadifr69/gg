- name: Deploy Tomcat Docker
  hosts: managed
  become: yes

  tasks:
    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Create app directory
      file:
        path: /home/ansible/app
        state: directory

    - name: Copy Dockerfile & WAR
      copy:
        src: "{{ item }}"
        dest: /home/ansible/app/
      loop:
        - Dockerfile
        - target/myapp.war

    - name: Build Docker image
      command: docker build -t mytomcat /home/ansible/app

    - name: Stop old container if exists
      command: docker stop tomcat_container || true
      ignore_errors: yes

    - name: Remove old container if exists
      command: docker rm tomcat_container || true
      ignore_errors: yes

    - name: Run Docker container
      command: docker run -d -p 8080:8080 --name tomcat_container mytomcat
